    />

    <!-- Preconnect Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload IBM Plex Mono CSS (non-blocking) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Preload Aeonik -->
    <link
      rel="preload"
      href="/fonts/Aeonik/Aeonik-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/Aeonik/Aeonik-Bold.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <style>
      body.locked {
        overflow-y: hidden;
        touch-action: none;
        padding-top: 120dvh;
      }

      #preloader {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 9999;
        display: flex;
        height: 100%;
        width: 100%;
        align-items: center;
        justify-content: center;
        background-color: black;
        transition-property: opacity;
        transition-duration: 0.4s; /* duration-400 */
        transition-timing-function: ease-in-out;
      }
      @media (max-width: 768px) {
        #preloader div {
          transform: scale(2);
        }
      }
    </style>

    <!-- Apollo Tracking -->
    <script>
      function initApollo() {
        var n = Math.random().toString(36).substring(7),
          o = document.createElement("script");
        ((o.src =
          "https://assets.apollo.io/micro/website-tracker/tracker.iife.js?nocache=" +
          n),
          (o.async = !0),
          (o.defer = !0),
          (o.onload = function () {
            if (window.trackingFunctions) {
              window.trackingFunctions.onLoad({
                appId: "69b5513d5d5110001dddd53f",
              });
            }
          }),
          (o.onerror = function () {
            console.warn("[Apollo] Tracker script failed to load");
          }),
          document.head.appendChild(o));
      }
      initApollo();
    </script>
  </head>

  <!-- Google tag (gtag.js) -->
  <script
    async
    src="https://www.googletagmanager.com/gtag/js?id=G-NZHNT4XPEC"
  ></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag("js", new Date());

    gtag("config", "G-NZHNT4XPEC");
  </script>

  <body class="locked">
    <script>
      if ("scrollRestoration" in history) {
        history.scrollRestoration = "manual";
      }
    </script>

    <div id="preloader"><div></div></div>
    <div id="react-root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Preloader -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie_light.min.js"></script>
    <script>
      function hidePreloader() {
        const preloader = document.getElementById("preloader");
        preloader.style.opacity = 0;
        document.body.classList.remove("locked");
        setTimeout(() => {
          preloader.remove();
        }, 400);
      }

      const anim = lottie.loadAnimation({
        container: document.querySelector("#preloader div"),
        path: "/preloader.json",
        renderer: "svg",
        loop: false,
        autoplay: true,
      });

      anim.addEventListener("data_ready", function () {
        setTimeout(() => {
          hidePreloader();
        }, 2750);
      });
    </script>

    <script>
      (function initApolloInbound() {
        var TIMEOUT_MS = 15000;
        var timeoutId;
        var style = document.createElement("style");
        style.id = "apollo-form-prehide-css";
        style.textContent =
          'form:has(input[type="email" i]),form:has(input[name="email" i]),.hs-form-iframe{position:relative!important}form:has(input[type="email" i])::before,form:has(input[name="email" i])::before,.hs-form-iframe::before{content:"";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;width:50px;height:50px;margin:auto;border:2.5px solid #e1e1e1;border-top:2.5px solid #9ea3a6;border-radius:50%;animation:spin 1s linear infinite;background-color:transparent;pointer-events:auto;z-index:999999;opacity:1}form:has(input[type="email" i]) *,form:has(input[name="email" i]) *,.hs-form-iframe *{opacity:0!important;user-select:none!important;pointer-events:none!important}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}';
        (document.head || document.documentElement).appendChild(style);
        function cleanup() {
          var styleEl = document.getElementById("apollo-form-prehide-css");
          if (styleEl) styleEl.remove();
          if (timeoutId) clearTimeout(timeoutId);
        }
        timeoutId = setTimeout(function () {
          console.warn(
            "[Apollo] Form enrichment timeout after 5s - revealing forms. Check network and console for errors."
          );
          cleanup();
        }, TIMEOUT_MS);
        var nocache = Math.random().toString(36).substring(7);
        var script = document.createElement("script");
        script.src =
          "https://assets.apollo.io/js/apollo-inbound.js?nocache=" + nocache;
        script.defer = true;
        script.onerror = function () {
          console.error("[Apollo] Failed to load form enrichment script");
          cleanup();
        };
        script.onload = function () {
          try {
            window.ApolloInbound.formEnrichment.init({
              appId: "69ba6a8ab012d6000dae07c1",
              onReady: function () {
                cleanup();
              },
              onError: function (err) {
                console.error("[Apollo] Form enrichment init error:", err);
                cleanup();
              },
            });
          } catch (err) {
            console.error("[Apollo] Error initializing form enrichment:", err);
            cleanup();
          }
        };
        document.head.appendChild(script);
      })();
    </script>
  </body>
</html>
