<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Gaiant" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gaiant</title>
    <meta
      name="description"
      content="Gaiant is the MENA region's AI powerhouse engineering bespoke systems and proprietary products that become the foundation for how businesses think, operate, and scale."
    />
    <!-- Security meta tags -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta
      http-equiv="Referrer-Policy"
      content="strict-origin-when-cross-origin"
    />
    <meta http-equiv="Permissions-Policy" content="" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://fonts.gstatic.com https://player.vimeo.com https://www.googletagmanager.com https://cdnjs.cloudflare.com https://assets.apollo.io https://unpkg.com https://cdn.jsdelivr.net https://vercel.live; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://assets.apollo.io; img-src 'self' data: https://*.vercel.app https://i.vimeocdn.com https://player.vimeo.com https://www.google-analytics.com https://www.googletagmanager.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.vercel.app https://player.vimeo.com https://*.vimeocdn.com https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://cdnjs.cloudflare.com https://unpkg.com https://cdn.jsdelivr.net https://aplo-evnt.com https://*.apollo.io http://internal-assets.staging-gcp.apollo.io; frame-src https://player.vimeo.com https://vercel.live/; media-src 'self' https://*.vimeocdn.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    />

    <!-- Preconnect Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload IBM Plex Mono CSS (non-blocking) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Preload Aeonik -->
    <link
      rel="preload"
      href="/fonts/Aeonik/Aeonik-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/Aeonik/Aeonik-Bold.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- Apollo Form -->
    <script>
      (function initApolloInbound() {
        var TIMEOUT_MS = 15000;
        var timeoutId;
        var style = document.createElement("style");
        style.id = "apollo-form-prehide-css";
        style.textContent =
          'form:has(input[type="email" i]),form:has(input[name="email" i]),.hs-form-iframe{position:relative!important}form:has(input[type="email" i])::before,form:has(input[name="email" i])::before,.hs-form-iframe::before{content:"";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;width:50px;height:50px;margin:auto;border:2.5px solid #e1e1e1;border-top:2.5px solid #9ea3a6;border-radius:50%;animation:spin 1s linear infinite;background-color:transparent;pointer-events:auto;z-index:999999;opacity:1}form:has(input[type="email" i]) *,form:has(input[name="email" i]) *,.hs-form-iframe *{opacity:0!important;user-select:none!important;pointer-events:none!important}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}';
        (document.head || document.documentElement).appendChild(style);
        function cleanup() {
          var styleEl = document.getElementById("apollo-form-prehide-css");
          if (styleEl) styleEl.remove();
          if (timeoutId) clearTimeout(timeoutId);
        }
        timeoutId = setTimeout(function () {
          console.warn(
            "[Apollo] Form enrichment timeout after 5s - revealing forms. Check network and console for errors."
          );
          cleanup();
        }, TIMEOUT_MS);
        var nocache = Math.random().toString(36).substring(7);
        var script = document.createElement("script");
        script.src =
          "https://assets.apollo.io/js/apollo-inbound.js?nocache=" + nocache;
        script.defer = true;
        script.onerror = function () {
          console.error("[Apollo] Failed to load form enrichment script");
          cleanup();
        };
        script.onload = function () {
          try {
            window.ApolloInbound.formEnrichment.init({
              appId: "69ba6a8ab012d6000dae07c1",
              onReady: function () {
                cleanup();
              },
              onError: function (err) {
                console.error("[Apollo] Form enrichment init error:", err);
                cleanup();
              },
            });
          } catch (err) {
            console.error("[Apollo] Error initializing form enrichment:", err);
            cleanup();
          }
        };
        document.head.appendChild(script);
      })();
    </script>
  </head>

  <body class="locked">
    <script>
      if ("scrollRestoration" in history) {
        history.scrollRestoration = "manual";
      }
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
