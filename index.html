<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Gaiant" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gaiant</title>
    <meta
      name="description"
      content="Gaiant is the MENA region's AI powerhouse engineering bespoke systems and proprietary products that become the foundation for how businesses think, operate, and scale."
    />
    <!-- Security meta tags -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta
      http-equiv="Referrer-Policy"
      content="strict-origin-when-cross-origin"
    />
    <meta http-equiv="Permissions-Policy" content="" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://fonts.gstatic.com https://player.vimeo.com https://www.googletagmanager.com https://cdnjs.cloudflare.com https://assets.apollo.io; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.vercel.app https://i.vimeocdn.com https://player.vimeo.com https://www.google-analytics.com https://www.googletagmanager.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.vercel.app https://player.vimeo.com https://*.vimeocdn.com https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://cdnjs.cloudflare.com https://assets.apollo.io; frame-src https://player.vimeo.com; media-src 'self' https://*.vimeocdn.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"
    />

    <!-- Preconnect Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload IBM Plex Mono CSS (non-blocking) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>

    <!-- Preload Aeonik -->
    <link
      rel="preload"
      href="/fonts/Aeonik/Aeonik-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/Aeonik/Aeonik-Bold.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <style>
      body.locked {
        overflow-y: hidden;
        touch-action: none;
        padding-top: 120dvh;
      }

      #preloader {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 9999;
        display: flex;
        height: 100%;
        width: 100%;
        align-items: center;
        justify-content: center;
        background-color: black;
        transition-property: opacity;
        transition-duration: 0.4s; /* duration-400 */
        transition-timing-function: ease-in-out;
      }
      #preloader div {
        transform: scale(2);
      }
      @media (max-width: 768px) {
        #preloader div {
          transform: scale(3);
        }
      }
    </style>
    <script>
      function initApollo() {
        var n = Math.random().toString(36).substring(7),
          o = document.createElement("script");
        ((o.src =
          "https://assets.apollo.io/micro/website-tracker/tracker.iife.js?nocache=" +
          n),
          (o.async = !0),
          (o.defer = !0),
          (o.onload = function () {
            window.trackingFunctions.onLoad({
              appId: "69b5513d5d5110001dddd53f",
            });
          }),
          document.head.appendChild(o));
      }
      initApollo();
    </script>
  </head>
  <!-- Google tag (gtag.js) -->
  <script
    async
    src="https://www.googletagmanager.com/gtag/js?id=G-NZHNT4XPEC"
  ></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() {
      dataLayer.push(arguments);
    }
    gtag("js", new Date());

    gtag("config", "G-NZHNT4XPEC");
  </script>

  <body class="locked">
    <script>
      if ("scrollRestoration" in history) {
        history.scrollRestoration = "manual";
      }
    </script>

    <div id="preloader"><div></div></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie_light.min.js"></script>
    <script>
      function hidePreloader() {
        const preloader = document.getElementById("preloader");
        preloader.style.opacity = 0;
        document.body.classList.remove("locked");
        setTimeout(() => {
          preloader.remove();
        }, 400);
      }

      const anim = lottie.loadAnimation({
        container: document.querySelector("#preloader div"),
        path: "/preloader.json",
        renderer: "svg",
        loop: false,
        autoplay: true,
      });

      anim.addEventListener("data_ready", function () {
        setTimeout(() => {
          hidePreloader();
        }, 2750);
      });
    </script>
  </body>
</html>
